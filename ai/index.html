<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepSeek AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.0.3/src/regular/style.min.css">
  <style>
    * {
      scrollbar-width: thin;
      scrollbar-color: #475569 #0b101d;
    }
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0b101d;
    }
    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 3px;
    }
    body {
      background-color: #0b101d;
    }
    .ai-message pre {
      background: #161d31;
      padding: 14px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .ai-message code {
      color: #7dd3fc;
    }
    .send-btn:active {
      scale: 0.95;
    }
  </style>
</head>
<body class="text-slate-100 h-screen flex flex-col overflow-hidden">
  <!-- 顶部导航 -->
  <header class="h-[64px] border-b border-slate-800 flex items-center justify-between px-6 shrink-0">
    <div class="flex items-center gap-2">
      <i class="ph ph-cube-transparent text-xl text-sky-400"></i>
      <span class="text-lg font-semibold">DeepSeek AI</span>
    </div>
    <button onclick="clearAllChat()" class="px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-sm transition">
      <i class="ph ph-trash-simple mr-1"></i>清空对话
    </button>
  </header>

  <!-- 对话区域 -->
  <div id="chatBox" class="flex-1 overflow-y-auto px-4 md:px-16 py-6 max-w-[1100px] mx-auto w-full">
    <div class="text-center text-slate-500 mt-20">
      <i class="ph ph-chat-circle-dots text-4xl mb-3 block"></i>
      <p>输入内容开始对话，模型：deepseek-v4-flash</p>
    </div>
  </div>

  <!-- 底部输入框 -->
  <div class="border-t border-slate-800 p-4 md:px-16 shrink-0">
    <div class="max-w-[1100px] mx-auto relative">
      <textarea id="userInput" rows="3" placeholder="请输入你的问题..."
        class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 pr-16 resize-none outline-none focus:border-sky-500 transition"></textarea>
      <button onclick="sendMessage()" class="send-btn absolute right-3 bottom-3 bg-sky-600 hover:bg-sky-700 w-10 h-10 rounded-lg flex items-center justify-center transition">
        <i class="ph ph-paper-plane-right text-lg"></i>
      </button>
    </div>
  </div>

  <script>
    // ========== 配置项（你的API信息） ==========
    const API_BASE = "https://token.sensenova.cn/v1";
    const API_KEY = "sk-xzdHly3CcmVj9rDhoUYUfIBx71vUjr65";
    const MODEL = "deepseek-v4-flash";
    // 公共跨域代理，失效自行更换
    const CORS_PROXY = "https://corsproxy.io/?";
    const STORAGE_KEY = "deepseek_chat_history";

    // DOM元素
    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");

    // 页面加载读取本地历史
    let messageHistory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    window.onload = renderHistory;

    // 渲染历史对话
    function renderHistory() {
      chatBox.innerHTML = `<div class="text-center text-slate-500 mt-20">
        <i class="ph ph-chat-circle-dots text-4xl mb-3 block"></i>
        <p>输入内容开始对话，模型：deepseek-v4-flash</p>
      </div>`;
      if (messageHistory.length === 0) return;
      chatBox.innerHTML = "";
      messageHistory.forEach(item => addMessageDom(item.role, item.content, false));
      scrollBottom();
    }

    // 新增消息DOM
    function addMessageDom(role, content, isStream = false) {
      const div = document.createElement("div");
      div.className = "my-6";
      if (role === "user") {
        div.innerHTML = `
          <div class="flex gap-3">
            <div class="w-9 h-9 rounded-lg bg-slate-700 flex items-center justify-center shrink-0">
              <i class="ph ph-user"></i>
            </div>
            <div class="user-message flex-1 bg-slate-900 rounded-xl p-4">${escapeHtml(content)}</div>
          </div>
        `;
      } else {
        div.innerHTML = `
          <div class="flex gap-3">
            <div class="w-9 h-9 rounded-lg bg-sky-600 flex items-center justify-center shrink-0">
              <i class="ph ph-robot"></i>
            </div>
            <div class="ai-message flex-1 rounded-xl p-4 border border-slate-800">${marked.parse(content)}</div>
          </div>
        `;
      }
      chatBox.appendChild(div);
      scrollBottom();
      return div;
    }

    // 更新流式AI输出内容
    function updateAiDom(el, text) {
      const aiContent = el.querySelector(".ai-message");
      aiContent.innerHTML = marked.parse(text);
      scrollBottom();
    }

    // 发送消息
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;
      // 清空输入框
      userInput.value = "";
      // 存入历史
      messageHistory.push({ role: "user", content: text });
      saveLocalHistory();
      addMessageDom("user", text);
      // 创建空AI占位
      const aiWrap = addMessageDom("assistant", "");
      let aiText = "";

      try {
        const res = await fetch(CORS_PROXY + encodeURIComponent(`${API_BASE}/chat/completions`), {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${API_KEY}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: MODEL,
            messages: messageHistory,
            stream: true
          })
        });

        if (!res.ok) throw new Error("接口请求失败，密钥或接口地址错误");
        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value);
          // 解析SSE流式数据
          const lines = chunk.split("\n").filter(line => line.startsWith("data: ") && line !== "data: [DONE]");
          lines.forEach(line => {
            const jsonStr = line.replace("data: ", "");
            const data = JSON.parse(jsonStr);
            if (data.choices?.[0]?.delta?.content) {
              aiText += data.choices[0].delta.content;
              updateAiDom(aiWrap, aiText);
            }
          });
        }
        // AI回复完成存入历史
        messageHistory.push({ role: "assistant", content: aiText });
        saveLocalHistory();
      } catch (err) {
        updateAiDom(aiWrap, `请求出错：${err.message}\n1.跨域代理失效，更换CORS_PROXY\n2.检查API密钥是否有效`);
      }
    }

    // 保存对话到浏览器本地存储
    function saveLocalHistory() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(messageHistory));
    }

    // 清空全部对话
    function clearAllChat() {
      messageHistory = [];
      localStorage.removeItem(STORAGE_KEY);
      renderHistory();
    }

    // 滚动到底部
    function scrollBottom() {
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // HTML转义防止XSS
    function escapeHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // 回车发送，Shift+Enter换行
    userInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
